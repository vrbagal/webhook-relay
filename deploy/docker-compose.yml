version: '3.9'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourPassword123!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=WebhookRelay;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true"
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "5000:80"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dashboard
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sqldata:
